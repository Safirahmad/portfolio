{% load static %}

<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- primary meta tags -->
    <title>Wren - Personal Blog Website</title>
    <meta name="title" content="Wren - Personal Blog Website" />
    <meta
      name="description"
      content="This is a blog html template made by codewithsadee"
    />

    <!-- favicon -->
    <link rel="shortcut icon" href="{% static 'favicon.svg' %}" type="image/svg+xml" />

    <!-- google font link -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Sans:wght@300;400;500;600;700;800&display=swap"
      rel="stylesheet"
    />

    <!-- custom css link -->
    <link rel="stylesheet" href="{% static 'assets/css/style.css' %}" />

    <!-- preload images -->
    <link rel="preload" as="image" href="{% static 'assets/images/hero-banner.png' %}" />
    <link rel="preload" as="image" href="{% static 'assets/images/pattern-2.svg' %}" />
    <link rel="preload" as="image" href="{% static 'assets/images/pattern-3.svg' %}" />
